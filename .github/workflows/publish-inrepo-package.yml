name: Publish In-Repo NuGet Package

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.gitignore'
      - '**/*.gitattributes'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-inrepo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: 'src/**/packages.lock.json'
    - name: Verify commit exists in origin/main
      run: |
        git fetch --no-tags --prune --depth=1 origin +refs/heads/*:refs/remotes/origin/*
        git branch --remote --contains | grep origin/main
    - name: Build
      working-directory: ./src
      run: dotnet build DeckSurf.SDK.sln --configuration Release
    - name: Test
      working-directory: ./src
      run: dotnet test DeckSurf.SDK.Tests/DeckSurf.SDK.Tests.csproj --configuration Release --no-build
    - name: Pack
      working-directory: ./src/DeckSurf.SDK
      run: dotnet pack --configuration Release --no-build --include-symbols --output .
    - name: Push
      working-directory: ./src/DeckSurf.SDK
      run: dotnet nuget push *.nupkg --source https://nuget.pkg.github.com/dend/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
